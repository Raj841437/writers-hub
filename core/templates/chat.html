<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>

    <style>
        body {
            background: #0f0f0f;
            color: white;
            font-family: sans-serif;
        }

        .container {
            width: 60%;
            margin: auto;
        }

        .message {
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
        }

        .me {
            background: #333;
            text-align: right;
        }

        .other {
            background: #1a1a1a;
        }

        input {
            width: 80%;
            padding: 10px;
        }
    </style>
</head>

<body>

<div class="container">

<h2>Chat with {{ other_user.username }}</h2>

{% for msg in messages %}
    <div class="message {% if msg.sender == user %}me{% else %}other{% endif %}">
        {{ msg.text }}
    </div>
{% endfor %}

<form method="POST">
    {% csrf_token %}
    <input type="text" name="text" placeholder="Type message..." required>
    <button type="submit">Send</button>
</form>

</div>

</body>
</html>
